server {
  listen 80;
  server_name localhost; # Or your domain

  location / {
    root   /usr/share/nginx/html;
    index  index.html index.htm;
    try_files $uri $uri/ /index.html; # Important for React Router
  }

  # You can add other locations here, for example, to proxy API requests
  # if you were running the backend on the same domain/port in a different setup.
  # location /api {
  #    proxy_pass http://backend:5000; # Assuming 'backend' is the service name of your backend container
  #    proxy_http_version 1.1;
  #    proxy_set_header Upgrade $http_upgrade;
  #    proxy_set_header Connection 'upgrade';
  #    proxy_set_header Host $host;
  #    proxy_cache_bypass $http_upgrade;
  # }
}
